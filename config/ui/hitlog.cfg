drawhitlogtitle = [
  uimodhgradient 0x282828 0x2F2323 11.0 1.0 [
    uivlist 0 [
      uigroup [
        uioffset $hudshadowspace $hudshadowspace [
            uicolortext (at $DeathScreen_DamageLogTitle) $hudshadowcolor $title_size
          ]
        uitext (at $DeathScreen_DamageLogTitle) $title_size
      ]
      if (> (gethitloglength) 7) [
        command_text = (concatword "(" (at $DeathScreen_DamageLogUse) " " (searchbinds "ums_delta  1") "/" (searchbinds "ums_delta -1") " " (at $DeathScreen_DamageLogToScroll) ")")
        uicolortext $command_text 0x33FF33 $meta_size
      ]
    ]
  ]
]

drawhitlogkill = [
  hitlog_index = $arg1
  hitlog_meta_color = 0xC6968D
  hitlog_verb_color = 0xE5A096
  hitlog_is_actor = (gethitlogisactor $hitlog_index)
  hitlog_hit_count = (gethitloghits $hitlog_index)
  hitlog_hit_word = (? (= $hitlog_hit_count 1) (at $DeathScreen_DamageLogHit) (at $DeathScreen_DamageLogHits))
  hitlog_name_preposition = (? $hitlog_is_actor (at $DeathScreen_DamageLogTo) (at $DeathScreen_DamageLogBy))

  uihlist 0 [
    uitarget 2.0 1.0 []
    uimodhgradient 0x7E1915 0x140D10 0 2.2 [
      uihlist 0 [
        uivlist 0 [
          uihlist 0 [
            uitarget 2.5 1.8 [
              uivlist 0 [
                uicolortext (at $DeathScreen_DamageKillingBlow) 0xFF5B39 (divf $txtsize 1.5)
                uitarget 2.0 0.62 [
                  uigroup [uioffset $hudshadowspace $hudshadowspace [uicolortext (gethitlogdamage $hitlog_index) $hudshadowcolor $kill_damage_size] ; uicolortext (gethitlogdamage $hitlog_index) 0xFF4B2F $kill_damage_size]
                ]
              ]
            ]
            uitarget 6.5 1.8 [uilogo (at $weapon_logo (gethitlogweapon $hitlog_index)) $kill_weapon_width $kill_weapon_height 0xFF2222 0.8]
          ]
          uihlist $spacing_size [
            uispace $spacing_size
            uicolortext (at $DeathScreen_DamageLogIn) $hitlog_meta_color $meta_size
            uicolortext $hitlog_hit_count 0xFF6A44 $meta_size
            uicolortext $hitlog_hit_word $hitlog_meta_color $meta_size
            uicolortext $hitlog_name_preposition $hitlog_meta_color $meta_size
            uitext (gethitlogname $hitlog_index) $meta_size
            uicolortext (at $DeathScreen_DamageLogAt) $hitlog_meta_color $meta_size
            uicolortext (gethitlogdistance $hitlog_index) $hitlog_verb_color $meta_size
            uicolortext (at $DeathScreen_Meters) $hitlog_meta_color $meta_size
            uialign -1
          ]
        ]
      ]
    ]
    uialign 1
  ]
]

drawhitlogactor = [
  hitlog_index = $arg1
  hitlog_hit_count = (gethitloghits $hitlog_index)
  hitlog_hit_word = (? (= $hitlog_hit_count 1) (at $DeathScreen_DamageLogHit) (at $DeathScreen_DamageLogHits))
  hitlog_name_preposition = (at $DeathScreen_DamageLogTo)
  hitlog_row_bg_up = 0x575A61
  hitlog_row_bg_dn = 0x1C1E22
  hitlog_amount_color = 0xF4F6FA
  hitlog_verb_color = 0xD8DCE5
  hitlog_darker_verb = (- $hitlog_verb_color 0x333333)
  hitlog_meta_color = 0xA8ADB8

  uivlist 0 [
    uihlist 0 [
      uimodhgradient $hitlog_row_bg_up $hitlog_row_bg_dn 0 1.07 [
        uihlist 0 [
          uitarget 2.0 1.0 [uilogo (at $weapon_logo (gethitlogweapon $hitlog_index)) $row_weapon_width $row_weapon_height 0xDDDDDD 0.8]
          uitarget 2.5 1.0 [
            uivlist 0 [
              uigroup [uioffset $hudshadowspace $hudshadowspace [uicolortext (gethitlogdamage $hitlog_index) $hudshadowcolor $row_damage_size] ; uicolortext (gethitlogdamage $hitlog_index) $hitlog_amount_color $row_damage_size]
              uihlist $spacing_size [
                uicolortext (at $DeathScreen_DamageLogIn) $hitlog_meta_color $meta_size
                uicolortext $hitlog_hit_count $hitlog_amount_color $meta_size
                uicolortext $hitlog_hit_word $hitlog_meta_color $meta_size
                uialign -1
              ]
            ]
          ]
          uitarget 4.5 1.0 [
            uivlist 0 [
              uihlist $spacing_size [
                uicolortext $hitlog_name_preposition $hitlog_verb_color $body_size
                uitext (gethitlogname $hitlog_index) $body_size
                uialign -1
              ]
              uihlist $spacing_size [
                uicolortext (at $DeathScreen_DamageLogAt) $hitlog_darker_verb $body_size
                uicolortext (gethitlogdistance $hitlog_index) $hitlog_verb_color $body_size
                uicolortext (at $DeathScreen_Meters) $hitlog_darker_verb $body_size
                uialign -1
              ]
            ]
          ]
        ]
      ]
      uitarget 2.0 1.0 []
    ]
  ]
]

drawhitlogdamagefromothers = [
  hitlog_index = $arg1
  hitlog_hit_count = (gethitloghits $hitlog_index)
  hitlog_hit_word = (? (= $hitlog_hit_count 1) (at $DeathScreen_DamageLogHit) (at $DeathScreen_DamageLogHits))
  hitlog_name_preposition = (at $DeathScreen_DamageLogBy)
  hitlog_row_bg_up = 0x531816
  hitlog_row_bg_dn = 0x120D10
  hitlog_amount_color = 0xFF4B2F
  hitlog_verb_color = 0xE5A096
  hitlog_darker_verb = (- $hitlog_verb_color 0x333333)
  hitlog_meta_color = 0xC6968D

  uivlist 0 [
    uihlist 0 [
      uitarget 2.0 1.0 []
      uimodhgradient $hitlog_row_bg_up $hitlog_row_bg_dn 0 1.07 [
        uihlist 0 [
          uitarget 2.5 1.0 [
            uivlist 0 [
              uigroup [uioffset $hudshadowspace $hudshadowspace [uicolortext (gethitlogdamage $hitlog_index) $hudshadowcolor $row_damage_size] ; uicolortext (gethitlogdamage $hitlog_index) $hitlog_amount_color $row_damage_size]
              uihlist $spacing_size [
                uicolortext (at $DeathScreen_DamageLogIn) $hitlog_meta_color $meta_size
                uicolortext $hitlog_hit_count $hitlog_amount_color $meta_size
                uicolortext $hitlog_hit_word $hitlog_meta_color $meta_size
                uialign -1
              ]
            ]
          ]
          uitarget 2.0 1.0 [uilogo (at $weapon_logo (gethitlogweapon $hitlog_index)) $row_weapon_width $row_weapon_height 0xFF2222 0.8]
          uitarget 4.5 1.0 [
            uivlist 0 [
              uihlist $spacing_size [
                uicolortext $hitlog_name_preposition $hitlog_verb_color $body_size
                uitext (gethitlogname $hitlog_index) $body_size
                uialign -1
              ]
              uihlist $spacing_size [
                uicolortext (at $DeathScreen_DamageLogAt) $hitlog_darker_verb $body_size
                uicolortext (gethitlogdistance $hitlog_index) $hitlog_verb_color $body_size
                uicolortext (at $DeathScreen_Meters) $hitlog_darker_verb $body_size
                uialign -1
              ]
            ]
          ]
        ]
      ]
    ]
  ]
]

newui "hitlog" [
  if (|| $mainmenu (uivisible "scoreboard") (! (gethitloglength))) [hideui "hitlog"]
  
  uiabovehud

  uieschide 0
  uialign -1 -1

  if (&& ($isconnected) (! $hidehud) (! $editing) (! $mainmenu)) [
    title_size = (divf $txtsize 1.5)
    kill_damage_size = (*f $title_size 2.0)
    row_damage_size = (*f $kill_damage_size 0.65)
    body_size = (*f $title_size 0.75)
    meta_size = (*f $title_size 0.65)
    spacing_size = (divf $txtsize 200.0)

    kill_card_width = 8.6
    row_card_width = 7.4
    row_gap = 0.05

    kill_weapon_height = (divf $txtsize 10.0)
    kill_weapon_width = (*f $kill_weapon_height 2)
    row_weapon_height = (*f $kill_weapon_height 0.5)
    row_weapon_width = (*f $row_weapon_height 2)

    kill_index = (gethitlogkillindex)

    uitarget $hudw $hudh [
      uihlist 0 [
        uivlist 0 [
          drawhitlogtitle
          uihlist 0 [
            uiscroll 0 8.95 [
              uivlist $row_gap [
                if (>= $kill_index 0) [
                  drawhitlogkill $kill_index
                ]
                loop i (gethitloglength) [
                  if (!= $i $kill_index) [
                    if (gethitlogisactor $i) [drawhitlogactor $i] [drawhitlogdamagefromothers $i]
                  ]
                ]
                uialign* 1
              ]
            ]
            UIvscroll 0 0 22.4
          ]
        ]
        uispace 1.0
        uialign 1 0
      ]
    ]
  ]
] [calcratio]
