////////////////////////////////////////////////
//
// particle shaders
//
////////////////////////////////////////////////

// wobbles the vertices of an explosion sphere
// and generates all texcoords 
// and blends the edge color
// and modulates the texture
explosionshader = [
    shader 0 $arg1 [
        //:fog
        attribute vec4 vvertex, vcolor;
        uniform mat4 explosionmatrix;
        uniform vec3 center;
        uniform float millis;
        attribute vec2 vtexcoord0;
        uniform vec4 texgenS, texgenT;
        @(? (>= (strstr $arg1 "soft") 0) [
            uniform vec2 lineardepthscale;
            varying float lineardepth;
        ])
        varying vec4 color;
        varying vec2 texcoord0, texcoord1, texcoord2;
        void main(void)
        {
            vec4 wobble = vec4(vvertex.xyz*(1.0 + 0.5*abs(fract(dot(vvertex.xyz, center) + millis*2.0) - 0.5)), vvertex.w);
            gl_Position = explosionmatrix * wobble;
            @(? (>= (strstr $arg1 "soft") 0) [
                lineardepth = dot(lineardepthscale, gl_Position.zw);
            ])

            color = vcolor;

            texcoord0 = vtexcoord0; 
            vec2 texgen = vec2(dot(texgenS, vvertex), dot(texgenT, vvertex)); 
            texcoord1 = texgen;
            texcoord2 = 0.5*texgen - millis*0.5;
        }
    ] [
        @(if (>= (strstr $arg1 "soft") 0) [result [
            @(gfetchdefs tex2)
            uniform vec3 softparams;
            varying float lineardepth;
        ]])
        varying vec4 color;
        varying vec2 texcoord0, texcoord1, texcoord2;
        uniform sampler2D tex0;
        uniform vec2 blendparams;
        fragdata(0) vec4 fragcolor;
        void main(void)
        {
            vec2 dtc = texcoord0 + texture2D(tex0, texcoord2).xy*0.1; // use color texture as noise to distort texcoords
            vec4 diffuse = texture2D(tex0, dtc);
            float blend = max(pow(clamp(1.0 - dot(texcoord1, texcoord1), 0.0, 1.0), blendparams.x), blendparams.y);
            diffuse *= blend*4.0; // dup alpha into RGB channels + intensify and over saturate
            diffuse.b += 0.5 - blend*0.5; // blue tint 

            @(if (>= (strstr $arg1 "soft") 0) [result [
                fragcolor.rgb = diffuse.rgb * color.rgb;

                @(gdepthunpack depth [gfetch(tex2, gl_FragCoord.xy)])
                fragcolor.a = diffuse.a * max(clamp((depth - lineardepth)*softparams.x - softparams.y, 0.0, 1.0) * color.a, softparams.z);
            ]] [result [
                fragcolor = diffuse * color;
            ]])
        }
    ]
]

explosionshader "explosion"
explosionshader "explosionsoft"

shader 0 "particlenotexture" [
    //:fog
    attribute vec4 vvertex, vcolor;
    uniform mat4 camprojmatrix;
    uniform vec4 colorscale;
    varying vec4 color;
    void main(void)
    {
        gl_Position = camprojmatrix * vvertex;
        color = vcolor * colorscale;
    }
] [
    varying vec4 color;
    fragdata(0) vec4 fragcolor;
    void main(void)
    {
        fragcolor = color;
    }
]

shader 0 "particletext" [
    //:fog
    attribute vec4 vvertex, vcolor;
    attribute vec2 vtexcoord0;
    uniform mat4 camprojmatrix;
    uniform float ldrscale;
    varying vec4 color;
    varying vec2 texcoord0;
    void main(void)
    {
        gl_Position = camprojmatrix * vvertex;
        texcoord0 = vtexcoord0;
        color = vec4(vcolor.rgb * ldrscale, vcolor.a);
    }
] [
    uniform vec4 textparams;
    uniform sampler2D tex0;
    varying vec4 color;
    varying vec2 texcoord0;
    fragdata(0) vec4 fragcolor;
    void main(void)
    {
        float dist = texture2D(tex0, texcoord0).r;
        float border = smoothstep(textparams.x, textparams.y, dist);
        float outline = smoothstep(textparams.z, textparams.w, dist);
        fragcolor = vec4(color.rgb * outline, color.a * border);
    }
]

particleshader = [
    shader 0 $arg1 [
        //:fog
        attribute vec4 vvertex, vcolor;
        attribute vec2 vtexcoord0;
        uniform mat4 camprojmatrix;
        uniform vec4 colorscale;
        varying vec4 color;
        varying vec2 texcoord0;
        @(? (>= (strstr $arg1 "soft") 0) [
            uniform vec2 lineardepthscale;
            varying float lineardepth;
            varying vec2 surface;
        ])
        void main(void)
        {
            gl_Position = camprojmatrix * vvertex;
            texcoord0 = vtexcoord0; 
            color = vcolor * colorscale; 

            @(? (>= (strstr $arg1 "soft") 0) [
                lineardepth = dot(lineardepthscale, gl_Position.zw);
                surface = vtexcoord0.xy*2.82842712474619 - 1.4142135623731;
            ])
        }
    ] [
        @(if (>= (strstr $arg1 "soft") 0) [result [
            @(gfetchdefs tex2)
            uniform vec3 softparams;
            varying float lineardepth;
            varying vec2 surface;
        ]])
        uniform sampler2D tex0;
        varying vec4 color;
        varying vec2 texcoord0;
        fragdata(0) vec4 fragcolor;
        void main(void)
        {
			vec4 diffuse = texture2D(tex0, texcoord0);

            @(if (>= (strstr $arg1 "soft") 0) [result [
                @(gdepthunpack depth [gfetch(tex2, gl_FragCoord.xy)])
                diffuse.a *= clamp((depth - lineardepth)*softparams.x - softparams.y - dot(surface, surface), 0.0, 1.0);
            ]])

            fragcolor = diffuse * color;
        }
    ]
]

particleshader "particle"
particleshader "particlesoft"

particlelightshader = [
    local shadowrect
    local softpart
    shadowrect = $arg2
    softpart = $arg3
    shader 0 $arg1 [
        //:fog
        attribute vec4 vvertex, vcolor;
        attribute vec2 vtexcoord0;
        uniform mat4 camprojmatrix;
        uniform vec4 colorscale;
        varying vec4 color;
        varying vec2 texcoord0;
        varying vec3 worldpos;
        @(? $softpart [
            uniform vec2 lineardepthscale;
            varying float lineardepth;
            varying vec2 surface;
        ])
        void main(void)
        {
            gl_Position = camprojmatrix * vvertex;
            texcoord0 = vtexcoord0;
            color = vcolor * colorscale;
            worldpos = vvertex.xyz;

            @(? $softpart [
                lineardepth = dot(lineardepthscale, gl_Position.zw);
                surface = vtexcoord0.xy*2.82842712474619 - 1.4142135623731;
            ])
        }
    ] [
        @(if $softpart [result [
            @(gfetchdefs tex2)
            uniform vec3 softparams;
            varying float lineardepth;
            varying vec2 surface;
        ]])
        uniform sampler2D tex0;
        @(? $shadowrect [uniform sampler2DRectShadow tex1;] [uniform sampler2DShadow tex1;])
        uniform vec3 sunlightdir;
        uniform vec3 sunlightcolor;
        uniform mat3 csmmatrix;
        uniform vec4 csmtc[8];
        uniform vec3 csmoffset[8];
        uniform vec2 csmz;
        uniform int csmcount;
        uniform int particlelightcount;
        uniform vec4 particlelightpos[4];   // xyz = light position / radius, w = 1 / radius
        uniform vec4 particlelightcolor[4]; // rgb = prepacked local-light chroma, a = luma
        uniform vec4 particlelightspot[4];  // xyz = -spotlight dir, w = spotlight scale
        uniform vec4 particlelightshadow[4];
        uniform vec2 particlelightoffset[4];
        uniform int particlesunlightdebug;
        uniform int particlelocallightdebug;
        uniform vec2 particlesunlightparams; // x = dark absorption percent, y = global intensity
        uniform vec2 particlelightcolorparams; // x = sunlight tint percent, y = local-light tint percent
        uniform float particlelocallightintensity;
        uniform vec2 shadowatlasscale;
        varying vec4 color;
        varying vec2 texcoord0;
        varying vec3 worldpos;
        fragdata(0) vec4 fragcolor;

        vec3 getcsmtc(vec3 pos, float distbias)
        {
            vec3 tc;
            vec3 lightpos = csmmatrix * pos;
            lightpos.z -= distbias;
            tc.z = csmz.x + lightpos.z*csmz.y;
            for(int i = 0; i < 8; ++i)
            {
                if(i >= csmcount) break;
                tc.xy = csmtc[i].xy + lightpos.xy*csmtc[i].z;
                if(max(abs(tc.x), abs(tc.y)) < csmtc[i].w) return tc + csmoffset[i];
            }
            return vec3(-1.0);
        }

        float shadowtap(vec3 shadowtc, vec2 offset)
        {
            @(? $shadowrect [
                return float(shadow2DRect(tex1, shadowtc + vec3(offset, 0.0)));
            ] [
                return float(shadow2D(tex1, vec3((shadowtc.xy + offset) * shadowatlasscale, shadowtc.z)));
            ])
        }

        float filtersunshadow(vec3 shadowtc)
        {
            vec2 offset = fract(shadowtc.xy - 0.5);
            vec3 center = vec3(shadowtc.xy - offset*0.5, shadowtc.z);
            vec4 size = vec4(offset + 1.0, 2.0 - offset);
            return (1.0/9.0) * dot(size.zxzx*size.wwyy,
                                   vec4(shadowtap(center, vec2(-0.5, -0.5)),
                                        shadowtap(center, vec2( 1.0, -0.5)),
                                        shadowtap(center, vec2(-0.5,  1.0)),
                                        shadowtap(center, vec2( 1.0,  1.0))));
        }

        float samplesunvisibility(vec3 pos, float distbias)
        {
            vec3 shadowtc = getcsmtc(pos, distbias);
            if(shadowtc.x < 0.0) return 1.0;
            return clamp(filtersunshadow(shadowtc), 0.0, 1.0);
        }

        vec3 getparticlelightspottc(vec3 dir, float spotdist, vec4 spotparams, vec4 shadowparams, vec2 shadowoffset, float distbias)
        {
            vec2 mparams = shadowparams.xy / max(spotdist + distbias, 1e-5);
            return vec3((dir.xy - spotparams.xy*(spotdist + (spotparams.z > 0.0 ? 1.0 : -1.0)*dir.z)*shadowparams.z) * mparams.x + shadowoffset, mparams.y + shadowparams.w);
        }

        vec3 getparticlelightshadowtc(vec3 dir, vec4 shadowparams, vec2 shadowoffset, float distbias)
        {
            vec3 adir = abs(dir);
            float m = max(adir.x, adir.y), mz = max(adir.z, m);
            vec2 mparams = shadowparams.xy / max(mz + distbias, 1e-5);
            vec4 proj;
            if(adir.x > adir.y) proj = vec4(dir.zyx, 0.0); else proj = vec4(dir.xzy, 1.0);
            if(adir.z > m) proj = vec4(dir, 2.0);
            return vec3(proj.xy * mparams.x + vec2(proj.w, step(0.0, proj.z)) * shadowparams.z + shadowoffset, mparams.y + shadowparams.w);
        }

        void applyparticlelight(inout vec3 shadedrgb, vec3 lighttint, float lightamount, float absorbmix, float density)
        {
            vec3 baseclamped = clamp(shadedrgb, 0.0, 1.0);
            float baseluma = clamp(dot(baseclamped, vec3(0.2126, 0.7152, 0.0722)), 0.0, 1.0);
            float darkness = 1.0 - baseluma;
            float darkpenalty = darkness * mix(0.55, 1.0, density);
            float receptivity = mix(1.0, 1.0 - 0.85 * darkpenalty, absorbmix);
            float applied = min(lightamount * receptivity, 1.75);
            float headroom = clamp(1.0 - max(max(baseclamped.r, baseclamped.g), baseclamped.b), 0.0, 1.0);
            // Lift darker particles more strongly while keeping brighter smoke from blowing out.
            vec3 lightlift = clamp(lighttint * (applied * mix(0.18, 0.80, headroom)), 0.0, 1.0);
            vec3 screenlit = 1.0 - (1.0 - baseclamped) * (1.0 - lightlift);
            vec3 lifted = shadedrgb + max(screenlit - baseclamped, vec3(0.0));
            shadedrgb = mix(shadedrgb, lifted, clamp(applied * mix(0.35, 0.85, headroom), 0.0, 1.0));
        }

        float sampleparticlelight(int index, float tintmix, out vec3 lighttint)
        {
            vec3 lightdir = particlelightpos[index].xyz - worldpos * particlelightpos[index].w;
            float lightdist2 = dot(lightdir, lightdir);
            if(lightdist2 >= 1.0) return 0.0;

            float lightinvdist = inversesqrt(max(lightdist2, 1.0e-5));
            float lightatten = 1.0 - lightdist2 * lightinvdist;
            float spotdist = 0.0;
            if(particlelightspot[index].w > 0.0)
            {
                spotdist = dot(lightdir, particlelightspot[index].xyz);
                float spotatten = 1.0 - (1.0 - lightinvdist * spotdist) * particlelightspot[index].w;
                if(spotatten <= 0.0) return 0.0;
                lightatten *= spotatten;
            }

            if(particlelightoffset[index].x >= 0.0)
            {
                vec3 shadowtc = particlelightspot[index].w > 0.0 ?
                    getparticlelightspottc(lightdir, spotdist, particlelightspot[index], particlelightshadow[index], particlelightoffset[index], 0.0) :
                    getparticlelightshadowtc(lightdir, particlelightshadow[index], particlelightoffset[index], 0.0);
                lightatten *= shadowtap(shadowtc, vec2(0.0));
                if(lightatten <= 1.0e-4) return 0.0;
            }

            float lightluma = particlelightcolor[index].a;
            if(lightluma <= 1.0e-4) return 0.0;

            vec3 chroma = particlelightcolor[index].rgb;
            lighttint = clamp(vec3(1.0) + (chroma - vec3(1.0)) * tintmix, 0.0, 5.0);
            return lightatten * lightluma;
        }

        void main(void)
        {
            vec4 diffuse = texture2D(tex0, texcoord0);

            @(if $softpart [result [
                @(gdepthunpack depth [gfetch(tex2, gl_FragCoord.xy)])
                diffuse.a *= clamp((depth - lineardepth)*softparams.x - softparams.y - dot(surface, surface), 0.0, 1.0);
            ]])

            vec4 base = diffuse * color;
            if(base.a < 1.0e-4) discard;
            vec4 shaded = base;
            float sunluma = clamp(dot(max(sunlightcolor, vec3(0.0)), vec3(0.2126, 0.7152, 0.0722)), 0.0, 2.0);
            float visibility = 0.0;
            float maxlocalamount = 0.0;
            bool hassun = base.a > 0.0 && csmcount > 0 && sunluma > 1.0e-4;
            if(hassun)
            {
                visibility = samplesunvisibility(worldpos, 0.0);
            }

            if(particlesunlightdebug > 0)
            {
                if(particlesunlightdebug > 1)
                {
                    fragcolor = vec4(0.0, 1.0, 1.0, base.a);
                    return;
                }

                fragcolor = hassun && visibility > 0.5 ? vec4(1.0, 0.0, 1.0, base.a) : base;
                return;
            }

            if(base.a > 0.0 && particlelightcount > 0)
            {
                float density = clamp(diffuse.a * color.a, 0.0, 1.0);
                float absorbmix = clamp(particlesunlightparams.x * 0.01, 0.0, 1.0);
                float localtintmix = clamp(particlelightcolorparams.y * 0.01, 0.0, 2.0);
                vec3 accumulatedtint = vec3(0.0);
                float accumulatedamount = 0.0;
                for(int i = 0; i < 4; ++i)
                {
                    if(i >= particlelightcount) break;
                    vec3 localtint;
                    float localamount = sampleparticlelight(i, localtintmix, localtint);
                    maxlocalamount = max(maxlocalamount, localamount);
                    if(localamount > 1.0e-4)
                    {
                        float weight = localamount * particlelocallightintensity;
                        accumulatedtint += localtint * weight;
                        accumulatedamount += weight;
                    }
                }
                if(accumulatedamount > 1.0e-4)
                {
                    vec3 blendedtint = accumulatedtint / max(accumulatedamount, 1.0e-5);
                    applyparticlelight(shaded.rgb, blendedtint, accumulatedamount, absorbmix, density);
                }
            }

            if(particlelocallightdebug > 0)
            {
                if(particlelocallightdebug > 3)
                {
                    float debugcount = clamp(float(particlelightcount) * 0.25, 0.0, 1.0);
                    fragcolor = vec4(vec3(debugcount), base.a);
                    return;
                }
                if(particlelocallightdebug > 2)
                {
                    fragcolor = particlelightcount > 0 ? vec4(0.0, 1.0, 1.0, base.a) : vec4(1.0, 0.0, 0.0, base.a);
                    return;
                }
                if(particlelocallightdebug > 1)
                {
                    float debugamount = clamp(maxlocalamount * particlelocallightintensity * 0.25, 0.0, 1.0);
                    fragcolor = vec4(vec3(debugamount), base.a);
                    return;
                }

                fragcolor = maxlocalamount > 1.0e-4 ? vec4(0.0, 1.0, 0.0, base.a) : base;
                return;
            }

            if(hassun)
            {
                float density = clamp(diffuse.a * color.a, 0.0, 1.0);
                float absorbmix = clamp(particlesunlightparams.x * 0.01, 0.0, 1.0);
                float suntintmix = clamp(particlelightcolorparams.x * 0.01, 0.0, 1.0);
                vec3 suntint = mix(vec3(1.0), clamp(sunlightcolor / max(sunluma, 1.0e-4), 0.0, 3.0), suntintmix);
                applyparticlelight(shaded.rgb, suntint, visibility * sunluma * particlesunlightparams.y, absorbmix, density);
            }

            fragcolor = shaded;
        }
    ]
]

particlelightshader "particlelightrect" 1 0
particlelightshader "particlelight2d" 0 0
particlelightshader "particlesoftlightrect" 1 1
particlelightshader "particlesoftlight2d" 0 1

shader 0 "particleshadow" [
    attribute vec4 vvertex, vcolor;
    attribute vec2 vtexcoord0;
    uniform mat4 shadowmatrix;
    varying vec2 texcoord0;
    varying float alpha;
    void main(void)
    {
        gl_Position = shadowmatrix * vvertex;
        texcoord0 = vtexcoord0;
        alpha = vcolor.a;
    }
] [
    uniform sampler2D tex0;
    uniform vec4 particleshadowparams; // x = opacity
    varying vec2 texcoord0;
    varying float alpha;
    fragdata(0) vec4 fragcolor;
    void main(void)
    {
        float shadow = clamp(texture2D(tex0, texcoord0).a * alpha * particleshadowparams.x, 0.0, 1.0);
        if(shadow <= 1.0/255.0) discard;
        fragcolor = vec4(vec3(1.0 - shadow), 1.0);
    }
]

shader 0 "particleHaze" [
    attribute vec4 vvertex, vcolor;
    attribute vec2 vtexcoord0;
    uniform mat4 camprojmatrix;
    uniform vec2 lineardepthscale;
    varying vec4 color;
    varying vec2 texcoord0, surface;
    varying float lineardepth;
    void main(void)
    {
        gl_Position = camprojmatrix * vvertex;
        texcoord0 = vtexcoord0;
        color = vcolor;
        lineardepth = dot(lineardepthscale, gl_Position.zw);
        surface = vtexcoord0.xy*2.82842712474619 - 1.4142135623731;
    }
] [
    @(gfetchdefs [tex1 tex2])
    uniform vec4 heatHazeParams;
    uniform vec2 heatHazeStrengths;
    uniform vec2 heatHazeScroll;
    uniform vec4 heatHazeOptions;
    uniform vec4 viewsize;
    uniform sampler2D tex0;
    varying vec4 color;
    varying vec2 texcoord0, surface;
    varying float lineardepth;
    fragdata(0) vec4 fragcolor;
    void main(void)
    {
        vec2 noiseTC = fract(texcoord0 + heatHazeScroll);
        vec4 noise = texture2D(tex0, noiseTC);
        vec2 jitter = (noise.xy*2.0 - 1.0) * 1.35;
        float noiseEdgeFade = clamp(noise.a * 1.35, 0.0, 1.0);
        float edgeFade = mix(1.0, noiseEdgeFade, clamp(heatHazeOptions.x, 0.0, 1.0));

        @(gdepthunpack depth [gfetch(tex2, gl_FragCoord.xy)])
        float camDepth = abs(lineardepth);
        float distMix = clamp((camDepth - heatHazeParams.z)*heatHazeParams.w, 0.0, 1.0);
        float softFade = clamp((lineardepth - depth)*heatHazeParams.y, 0.0, 1.0);
        float mask = clamp(1.0 - dot(surface, surface), 0.0, 1.0);
        float lifeFade = clamp(color.a, 0.0, 1.0);
        float colorMod = clamp(dot(color.rgb, vec3(0.299, 0.587, 0.114)), 0.0, 1.0);
        float strength = mix(heatHazeStrengths.x, heatHazeStrengths.y, distMix)
                         * heatHazeParams.x * mask * softFade * lifeFade * colorMod;

        vec2 sceneTC = floor(gl_FragCoord.xy) + 0.5;
        vec2 rtc = floor(sceneTC + jitter*strength) + 0.5;
        rtc = clamp(rtc, vec2(0.5), viewsize.xy - vec2(0.5));
        // Fetch scene depth at the candidate refracted position.
        @(gdepthunpack refractDepth [gfetch(tex2, rtc)])
        // If the geometry there is in front of the haze, the refracted sample
        float refractFade = clamp((lineardepth - refractDepth) * heatHazeParams.y, 0.0, 1.0);
        rtc = mix(sceneTC, rtc, refractFade);

        vec3 refracted = gfetch(tex1, rtc).rgb;
        float amount = clamp(mask * softFade * edgeFade * lifeFade, 0.0, 1.0);
        fragcolor = vec4(refracted, amount);
    }
]
