lazyshader 0 "lensflare" [
    attribute vec4 vvertex;
    void main(void)
    {
        gl_Position = vvertex;
    }
] [
    @(gfetchdefs tex0 $msaalight)
    @(gfetchdefs tex1 $msaalight ngfetch)
    uniform sampler2DRect tex2;
    uniform vec3 sunFlareColor;
    uniform vec4 sunFlareScreen; // xy = screen uv, z = screen fade, w = shaft scale
    uniform vec4 sunFlareParams; // x = strength, y = opacity scale from source color intensity, z = time, w = sun energy boost
    uniform float sunFlareGhostStrength;
    uniform float sunFlareFovScale;
    uniform float sunFlareSizeScale;
    uniform float sunFlareBranchThickness;
    uniform vec4 sunFlareCloudTex; // xy = view-to-cloud scale, zw = cloud texture size
    uniform vec4 sunFlareLayerWeights; // x = core, y = halo, z = streaks, w = ghosts
    uniform vec4 sunFlareVisibilityOverride; // x = source visibility override, y = atmosphere mask override, z = source depth, w = point-source occlusion radius in pixels
    uniform vec4 viewsize;
    fragdata(0) vec4 fragcolor;

    float hash12(vec2 p)
    {
        vec3 p3 = fract(vec3(p.xyx) * 0.1031);
        p3 += dot(p3, p3.yzx + 33.33);
        return fract((p3.x + p3.y) * p3.z);
    }

    float noise2(vec2 p)
    {
        vec2 i = floor(p);
        vec2 f = fract(p);
        f = f*f*(3.0 - 2.0*f);

        float a = hash12(i);
        float b = hash12(i + vec2(1.0, 0.0));
        float c = hash12(i + vec2(0.0, 1.0));
        float d = hash12(i + vec2(1.0, 1.0));

        return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
    }

    float fbm(vec2 p)
    {
        float value = 0.0;
        float amplitude = 0.5;
        for(int i = 0; i < 4; ++i)
        {
            value += amplitude * noise2(p);
            p = p*2.03 + vec2(19.1, 7.3);
            amplitude *= 0.5;
        }
        return value;
    }

    float sampleSky(vec2 sampleTc)
    {
        vec4 normalSample = ngfetch(tex1, sampleTc);
        @(gdepthunpack depth [gfetch(tex0, sampleTc)])
        return dot(normalSample.rgb, normalSample.rgb) <= 1.0e-6 || depth >= 0.999999 ? 1.0 : 0.0;
    }

    float sampleCloudTransmittance(vec2 sampleTc)
    {
        if(sunFlareCloudTex.z <= 0.0 || sunFlareCloudTex.w <= 0.0) return 1.0;
        vec2 cloudTc = clamp(sampleTc * sunFlareCloudTex.xy, vec2(0.5), sunFlareCloudTex.zw - vec2(0.5));
        return 1.0 - clamp(texture2DRect(tex2, cloudTc).a, 0.0, 1.0);
    }

    float samplePointSourceVisibility(vec2 sampleTc, float sourceDepth)
    {
        vec4 normalSample = ngfetch(tex1, sampleTc);
        @(gdepthunpack depth [gfetch(tex0, sampleTc)])
        float isSky = dot(normalSample.rgb, normalSample.rgb) <= 1.0e-6 || depth >= 0.999999 ? 1.0 : 0.0;
        float depthVisible = max(isSky, depth <= sourceDepth - 0.25 ? 1.0 : 0.0);
        return depthVisible * sampleCloudTransmittance(sampleTc);
    }

    float sampleSourceVisibility(vec2 sampleTc)
    {
        if(sunFlareVisibilityOverride.w > 0.0) return samplePointSourceVisibility(sampleTc, sunFlareVisibilityOverride.z);
        return sampleSky(sampleTc) * sampleCloudTransmittance(sampleTc);
    }

    void accumulateSourceVisibility(vec2 sunPixel, vec2 offset, float weight, inout float sum, inout float total)
    {
        vec2 sampleTc = clamp(sunPixel + offset, vec2(0.5), viewsize.xy - vec2(0.5));
        sum += sampleSourceVisibility(sampleTc) * weight;
        total += weight;
    }

    float sunVisibility(vec2 sunPixel, float sampleRadius)
    {
        float sum = 0.0;
        float total = 0.0;
        accumulateSourceVisibility(sunPixel, vec2(0.0), 4.0, sum, total);
        accumulateSourceVisibility(sunPixel, vec2( sampleRadius, 0.0), 2.0, sum, total);
        accumulateSourceVisibility(sunPixel, vec2(-sampleRadius, 0.0), 2.0, sum, total);
        accumulateSourceVisibility(sunPixel, vec2(0.0,  sampleRadius), 2.0, sum, total);
        accumulateSourceVisibility(sunPixel, vec2(0.0, -sampleRadius), 2.0, sum, total);
        accumulateSourceVisibility(sunPixel, vec2( sampleRadius,  sampleRadius), 1.5, sum, total);
        accumulateSourceVisibility(sunPixel, vec2(-sampleRadius,  sampleRadius), 1.5, sum, total);
        accumulateSourceVisibility(sunPixel, vec2( sampleRadius, -sampleRadius), 1.5, sum, total);
        accumulateSourceVisibility(sunPixel, vec2(-sampleRadius, -sampleRadius), 1.5, sum, total);
        float visibility = sum / max(total, 1.0e-4);
        return visibility*visibility*(3.0 - 2.0*visibility);
    }

    float ghostShape(vec2 uv, vec2 center, vec2 aspect, float radius, float ringWeight)
    {
        vec2 delta = (uv - center) * aspect;
        float r = length(delta) / max(radius, 1.0e-4);
        float core = exp(-r*r*3.8);
        float ring = exp(-pow(r - 0.62, 2.0) * 24.0);
        float edge = 1.0 - smoothstep(1.0, 1.6, r);
        return edge * (core + ringWeight * ring);
    }

    vec3 ghostChromatic(vec2 uv, vec2 center, vec2 aspect, float radius, float ringWeight, vec2 axisDir)
    {
        vec2 ca = axisDir * radius * 0.03;
        float r = ghostShape(uv + ca, center, aspect, radius * 1.01, ringWeight);
        float g = ghostShape(uv, center, aspect, radius, ringWeight);
        float b = ghostShape(uv - ca, center, aspect, radius * 0.99, ringWeight);
        return vec3(r, g, b);
    }

    vec2 ghostPos(vec2 centerUv, vec2 flareAxis, float t)
    {
        return centerUv + flareAxis * t;
    }

    float ghostRadius(float t, float fovScale)
    {
        return mix(0.05, 0.16, clamp(abs(t) / 1.8, 0.0, 1.0)) * fovScale;
    }

    float blurredCosSpoke(float angle, float frequency, float phase, float sharpness, float blurAmount)
    {
        float center = pow(abs(cos(angle * frequency + phase)), sharpness);
        if(blurAmount <= 1.0e-4) return center;

        float sideSharpness = max(sharpness * 0.55, 1.0);
        float left = pow(abs(cos((angle - blurAmount) * frequency + phase)), sideSharpness);
        float right = pow(abs(cos((angle + blurAmount) * frequency + phase)), sideSharpness);
        return (left + center * 2.0 + right) * 0.25;
    }

    void main(void)
    {
        vec2 uv = gl_FragCoord.xy * viewsize.zw;
        vec2 sunUv = sunFlareScreen.xy;
        vec2 centerUv = vec2(0.5);
        vec2 aspect = vec2(viewsize.x / max(viewsize.y, 1.0), 1.0);
        float shaftScale = max(sunFlareScreen.w, 0.01);
        float fovScale = max(sunFlareFovScale, 0.01);
        float flareScale = max(sunFlareSizeScale, 0.01);
        vec2 local = (uv - sunUv) * aspect / (fovScale * flareScale);
        float sunDist = length(local);
        float angle = atan(local.y, local.x);

        vec2 flareAxis = centerUv - sunUv;
        vec2 ghostAxisDir = normalize(flareAxis + vec2(1.0e-6, 0.0));
        float ghostT0 = -0.18;
        float ghostT1 = 0.35;
        float ghostT2 = 0.78;
        float ghostT3 = 1.24;
        float ghostT4 = 1.75;
        vec2 ghostPos0 = ghostPos(centerUv, flareAxis, ghostT0);
        vec2 ghostPos1 = ghostPos(centerUv, flareAxis, ghostT1);
        vec2 ghostPos2 = ghostPos(centerUv, flareAxis, ghostT2);
        vec2 ghostPos3 = ghostPos(centerUv, flareAxis, ghostT3);
        vec2 ghostPos4 = ghostPos(centerUv, flareAxis, ghostT4);

        if(sunFlareScreen.z <= 1.0e-4 || sunFlareParams.x <= 1.0e-4)
        {
            fragcolor = vec4(0.0);
            return;
        }

        float sampleRadius = sunFlareVisibilityOverride.w > 0.0 ? sunFlareVisibilityOverride.w : mix(4.0, 11.0, clamp(sunFlareParams.w / 3.0, 0.0, 1.0)) * fovScale;
        float sourceVisOverride = sunFlareVisibilityOverride.x;
        float atmosphereMaskOverride = sunFlareVisibilityOverride.y;
        float coreVis = sourceVisOverride >= 0.0 ? sourceVisOverride : sunVisibility(sunUv * viewsize.xy, sampleRadius * 0.55);
        float haloVis = sourceVisOverride >= 0.0 ? sourceVisOverride : sunVisibility(sunUv * viewsize.xy, sampleRadius * 1.10);
        float ghostVis = sourceVisOverride >= 0.0 ? sourceVisOverride : sunVisibility(sunUv * viewsize.xy, sampleRadius * 1.45);
        float streakVis = sourceVisOverride >= 0.0 ? sourceVisOverride : sunVisibility(sunUv * viewsize.xy, sampleRadius * 0.85);
        float shaftFade = sunFlareScreen.z;
        vec2 currentPixel = clamp(gl_FragCoord.xy, vec2(0.5), viewsize.xy - vec2(0.5));
        float atmosphereMask = atmosphereMaskOverride >= 0.0 ? atmosphereMaskOverride : sampleSourceVisibility(currentPixel);
        float coreFade = shaftFade * coreVis * atmosphereMask;
        float haloFade = shaftFade * haloVis * atmosphereMask;
        float ghostFade = sunFlareScreen.z * ghostVis;
        float streakDepthMask = sunFlareVisibilityOverride.w > 0.0 ? atmosphereMask : 1.0;
        float streakFade = shaftFade * streakVis * streakDepthMask;
        if(max(max(coreFade, haloFade), max(ghostFade, streakFade)) <= 1.0e-4)
        {
            fragcolor = vec4(0.0);
            return;
        }

        float coreDisk = exp(-pow(sunDist / 0.018, 2.4) * 3.4);
        float blownCore = exp(-pow(sunDist / 0.042, 1.3) * 2.2);
        float halo = pow(max(1.0 - sunDist / 0.24, 0.0), 2.6);
        float corona = exp(-sunDist * 7.2) * (0.65 + 0.35 * exp(-sunDist * 16.0));

        float shaftNoise = fbm(vec2(angle * 2.0 + 3.1, sunDist * 18.0 - sunFlareParams.z * 0.12));
        float streakOcclusion = clamp(1.0 - streakVis, 0.0, 1.0);
        float streakBlur = pow(smoothstep(0.04, 0.95, streakOcclusion), 0.55);
        float streakMelt = smoothstep(0.10, 1.0, streakBlur);
        float branchThickness = max(sunFlareBranchThickness, 0.05);
        float branchSharpnessScale = 1.0 / branchThickness;
        float angleBlur = mix(0.0, 0.14, streakBlur) * sqrt(branchThickness);
        float rayPrimary = blurredCosSpoke(angle, 4.0, 0.0, max(mix(28.0, 9.0, streakBlur) * branchSharpnessScale, 1.0), angleBlur);
        float raySecondary = blurredCosSpoke(angle, 6.0, 0.28, max(mix(38.0, 11.0, streakBlur) * branchSharpnessScale, 1.0), angleBlur * 1.35);
        float shaftPattern = rayPrimary * (0.78 + 0.22 * shaftNoise) + raySecondary * (0.50 + 0.30 * shaftNoise);
        float shaftMask = smoothstep(mix(0.08, 0.02, streakBlur), mix(0.30, 0.15, streakBlur), shaftPattern);
        float starburst = shaftPattern * shaftMask;
        starburst *= exp(-sunDist * (mix(4.4, 2.1, streakBlur) / shaftScale)) / (mix(0.18, 0.46, streakBlur) + sunDist * (mix(9.0, 5.0, streakBlur) / shaftScale));
        starburst *= 1.0 - exp(-sunDist * mix(90.0, 38.0, streakBlur));
        float meltCoreReject = smoothstep(mix(0.004, 0.010, streakMelt), mix(0.020, 0.060, streakMelt), sunDist);
        float meltedBurst = exp(-sunDist * (mix(16.0, 5.5, streakMelt) / shaftScale));
        meltedBurst *= 1.0 - exp(-sunDist * mix(115.0, 24.0, streakMelt));
        meltedBurst /= mix(0.42, 0.20, streakMelt) + sunDist * (mix(12.0, 4.0, streakMelt) / shaftScale);
        meltedBurst *= meltCoreReject;
        starburst = mix(starburst, max(starburst, meltedBurst * 0.72), streakMelt * 0.92);

        vec2 diagDir = normalize(vec2(1.0, -0.55));
        float diagAcross = abs(dot(local, vec2(-diagDir.y, diagDir.x)));
        float diagAlong = abs(dot(local, diagDir));
        float anamorphicLine = exp(-diagAcross * diagAcross * mix(3600.0, 420.0, streakBlur));
        float anamorphicMask = smoothstep(mix(0.03, 0.014, streakBlur), mix(0.12, 0.22, streakBlur), anamorphicLine);
        float anamorphic = anamorphicLine * anamorphicMask * exp(-diagAlong * (mix(3.0, 1.6, streakBlur) / shaftScale));
        anamorphic *= 1.0 - exp(-sunDist * mix(80.0, 35.0, streakBlur));
        float anamorphicMelt = exp(-diagAcross * diagAcross * mix(720.0, 140.0, streakMelt));
        anamorphicMelt *= exp(-diagAlong * (mix(2.1, 1.0, streakMelt) / shaftScale));
        anamorphicMelt *= 1.0 - exp(-sunDist * mix(65.0, 24.0, streakMelt));
        anamorphicMelt *= meltCoreReject;
        anamorphic = mix(anamorphic, max(anamorphic, anamorphicMelt * 0.68), streakMelt * 0.85);

        float ghostStrength = sunFlareGhostStrength;
        vec3 ghostChroma0 = ghostChromatic(uv, ghostPos0, aspect, ghostRadius(ghostT0, fovScale * flareScale), 0.22, ghostAxisDir) * ghostStrength * 0.62;
        vec3 ghostChroma1 = ghostChromatic(uv, ghostPos1, aspect, ghostRadius(ghostT1, fovScale * flareScale), 0.36, ghostAxisDir) * ghostStrength * 0.88;
        vec3 ghostChroma2 = ghostChromatic(uv, ghostPos2, aspect, ghostRadius(ghostT2, fovScale * flareScale), 0.58, ghostAxisDir) * ghostStrength * 1.00;
        vec3 ghostChroma3 = ghostChromatic(uv, ghostPos3, aspect, ghostRadius(ghostT3, fovScale * flareScale), 0.46, ghostAxisDir) * ghostStrength * 0.74;
        vec3 ghostChroma4 = ghostChromatic(uv, ghostPos4, aspect, ghostRadius(ghostT4, fovScale * flareScale), 0.30, ghostAxisDir) * ghostStrength * 0.48;
        float ghost0 = max(max(ghostChroma0.r, ghostChroma0.g), ghostChroma0.b);
        float ghost1 = max(max(ghostChroma1.r, ghostChroma1.g), ghostChroma1.b);
        float ghost2 = max(max(ghostChroma2.r, ghostChroma2.g), ghostChroma2.b);
        float ghost3 = max(max(ghostChroma3.r, ghostChroma3.g), ghostChroma3.b);
        float ghost4 = max(max(ghostChroma4.r, ghostChroma4.g), ghostChroma4.b);

        vec3 warmTintClamp = vec3(1.0, 0.85, 0.70);
        vec3 sunTint = min(clamp(sunFlareColor, vec3(0.0), vec3(1.0)), warmTintClamp);
        vec3 coreColor = min(mix(sunTint, vec3(1.0), 0.34), warmTintClamp);
        vec3 haloColor = min(mix(sunTint, warmTintClamp, 0.16), warmTintClamp);
        vec3 streakColor = min(mix(sunTint, vec3(1.0), 0.20), warmTintClamp);
        vec3 ghostWarmColor = min(mix(sunTint, vec3(1.0, 0.94, 0.86), 0.14), warmTintClamp);
        vec3 ghostCoolColor = min(mix(sunTint, vec3(0.96, 0.98, 1.0), 0.10), warmTintClamp);
        float exposure = max(sunFlareParams.w, 0.0);
        float flareBoost = 1.0 - exp(-exposure * 1.6);
        float flareCompression = 1.0 / (1.0 + exposure * 0.25);
        float coreBoost = mix(0.8, 1.8, flareBoost);
        float haloBoost = mix(0.9, 1.4, flareBoost);
        float ghostBoost = mix(0.7, 1.25, flareBoost);
        float streakBoost = mix(0.6, 1.6, flareBoost);
        vec4 layerWeights = clamp(sunFlareLayerWeights, vec4(0.0), vec4(4.0));

        float ghostMask = clamp(ghost0 * 0.70 + ghost1 * 0.82 + ghost2 + ghost3 * 0.68 + ghost4 * 0.52, 0.0, 1.0) * layerWeights.w;
        float lensAlpha = ghostMask;
        float coreAlpha = clamp(coreDisk * 1.25 + blownCore * 0.90, 0.0, 1.0);
        float haloAlpha = clamp(halo * 0.65 + corona * 0.25, 0.0, 1.0);
        float streakAlpha = clamp(starburst * 0.55 + anamorphic * 0.75, 0.0, 1.0);

        vec3 lensColor = vec3(0.0);
        lensColor += ghostWarmColor * ghostChroma0 * 0.44;
        lensColor += ghostCoolColor * ghostChroma1 * 0.56;
        lensColor += ghostWarmColor * ghostChroma2 * 0.78;
        lensColor += ghostCoolColor * ghostChroma3 * 0.46;
        lensColor += ghostWarmColor * ghostChroma4 * 0.30;

        vec3 coreLayer = coreColor * (coreDisk * 2.8 * coreBoost + blownCore * 1.9 * coreBoost) * layerWeights.x;
        vec3 haloLayer = haloColor * (halo * 1.35 * haloBoost + corona * 0.95 * haloBoost) * layerWeights.y;
        vec3 streakLayer = streakColor * (starburst * 1.25 * streakBoost + anamorphic * 0.95 * streakBoost) * layerWeights.z;

        lensColor *= ghostBoost * layerWeights.w;
        vec3 color = coreLayer * coreFade + haloLayer * haloFade + streakLayer * streakFade + lensColor * ghostFade;
        float opacityScale = clamp(sunFlareParams.y, 0.0, 1.0);
        float flareAlpha = clamp(max(max(coreAlpha * layerWeights.x * coreFade, haloAlpha * layerWeights.y * haloFade), max(streakAlpha * layerWeights.z * streakFade, lensAlpha * ghostFade)), 0.0, 1.0) * opacityScale;
        float intensity = sunFlareParams.x * flareCompression;
        if(flareAlpha <= 1.0e-4 || intensity <= 1.0e-4 || dot(color, color) <= 1.0e-8)
        {
            fragcolor = vec4(0.0);
            return;
        }
        color *= intensity;
        fragcolor = vec4(color, flareAlpha);
    }
]
