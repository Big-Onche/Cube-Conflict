////////////////////////////////////////////////
//
// Crepuscular Rays
//
////////////////////////////////////////////////

shader 0 "cloudCrepuscularRays" [
    attribute vec4 vvertex;
    @(screentexcoord 0)
    varying vec2 depthTexCoord;

    void main(void)
    {
        gl_Position = vvertex;
        depthTexCoord = vtexcoord0;
    }
] [
    @(gfetchdefs tex0)
    uniform sampler2D tex1;
    uniform mat4 worldmatrix;
    uniform vec3 camera;
    uniform vec3 sunDir;
    uniform vec3 sunColor;
    uniform vec4 cloudShadowParams;
    uniform vec4 cloudShadowTransform;
    uniform vec3 cloudShadowColor;
    uniform vec4 godRayMarchParams; // x=forward exp, y=density, z=max distance, w=max accumulation clamp
    uniform vec4 godRayDistanceParams;
    uniform float cloudShadowStrength;
    varying vec2 depthTexCoord;
    fragdata(0) vec4 fragColor;

    vec2 sampleCloudLayer(vec3 relativePos)
    {
        if(cloudShadowStrength <= 0.0 || sunDir.z <= 1.0e-4) return vec2(1.0, 0.0);

        float sunProjection = (cloudShadowParams.x - relativePos.z) / sunDir.z;
        if(sunProjection < 0.0) return vec2(1.0, 0.0);

        vec2 projected = relativePos.xy + sunDir.xy * sunProjection;
        float projectedDistance = length(projected);
        if(projectedDistance >= cloudShadowParams.w) return vec2(1.0, 0.0);

        float fade = cloudShadowParams.z < cloudShadowParams.w ? 1.0 - smoothstep(cloudShadowParams.z, cloudShadowParams.w, projectedDistance) : 1.0;
        vec2 rotated = vec2(dot(projected, cloudShadowTransform.zw), projected.y*cloudShadowTransform.z - projected.x*cloudShadowTransform.w);
        vec2 cloudTexCoord = vec2(cloudShadowTransform.x - rotated.x * cloudShadowParams.y,
                                  cloudShadowTransform.y + rotated.y * cloudShadowParams.y);

        float cloudSample = texture2D(tex1, cloudTexCoord).a;
        float cloudMask = clamp(cloudSample * cloudShadowStrength * fade, 0.0, 1.0);
        return vec2(1.0 - cloudMask, cloudMask);
    }

    void main(void)
    {
        @(gdepthunpack sceneDepth [gfetch(tex0, depthTexCoord)] [
            vec3 scenePos = (worldmatrix * vec4(sceneDepth*depthTexCoord, sceneDepth, 1.0)).xyz;
        ] [
            vec4 scenePos4 = worldmatrix * vec4(depthTexCoord, sceneDepth, 1.0);
            vec3 scenePos = scenePos4.xyz / scenePos4.w;
        ])

        vec3 rayVector = scenePos - camera;
        float sceneDistance = length(rayVector);

        if(sceneDistance <= 1.0e-4 || sunDir.z <= 1.0e-4)
        {
            fragColor = vec4(0.0, 0.0, 0.0, 0.0);
            return;
        }

        vec3 viewDirection = rayVector / sceneDistance;
        float maxDistance = min(sceneDistance, godRayMarchParams.z);
        if(abs(viewDirection.z) > 1.0e-4)
        {
            float cloudLayerDistance = cloudShadowParams.x / viewDirection.z;
            if(cloudLayerDistance > 0.0) maxDistance = min(maxDistance, cloudLayerDistance);
        }
        float stepCount = clamp(godRayDistanceParams.z, 1.0, 64.0);
        float stepSize = maxDistance / stepCount;

        if(stepSize <= 1.0e-5)
        {
            fragColor = vec4(0.0, 0.0, 0.0, 0.0);
            return;
        }

        float sceneDistanceWeight = smoothstep(godRayDistanceParams.x, godRayDistanceParams.y, sceneDistance);
        float sunView = clamp(dot(viewDirection, sunDir), 0.0, 1.0);
        float forwardScatter = mix(0.25, 1.0, pow(sunView, max(godRayMarchParams.x, 1.0)));
        float sunCoreSuppress = smoothstep(0.985, 0.9996, sunView);
        forwardScatter *= 1.0 - 0.55 * sunCoreSuppress;
        float rayIntensity = max(godRayMarchParams.y, 0.25) * 0.24;
        float dither = fract(dot(gl_FragCoord.xy, vec2(0.75487766, 0.56984030)) * 52.9829189);

        float runningMean = 0.5;
        float runningMeanBlend = 1.0 - pow(1.0 - 0.06, 16.0 / stepCount);

        float shaftAccum = 0.0;
        vec3 tintAccum = vec3(0.0);

        for(int stepIndex = 0; stepIndex < 64; ++stepIndex)
        {
            if(float(stepIndex) >= stepCount) break;

            float sampleDistance = (float(stepIndex) + dither + 0.5) * stepSize;
            sampleDistance = min(sampleDistance, maxDistance);
            vec3 relativePos = viewDirection * sampleDistance;
            float distanceWeight = smoothstep(godRayDistanceParams.x, godRayDistanceParams.y, sampleDistance);
            distanceWeight = pow(distanceWeight, 1.0 / max(godRayMarchParams.y, 1.0e-3));

            vec2 cloudLayer = sampleCloudLayer(relativePos);
            float transmittance = cloudLayer.x;

            float excess = max(transmittance - runningMean, 0.0);
            runningMean = mix(runningMean, transmittance, runningMeanBlend);

            float transmissionWeight = pow(transmittance, 1.35);
            float beamWeight = pow(excess, 0.7) * transmissionWeight * distanceWeight;
            beamWeight = mix(beamWeight * beamWeight, beamWeight, clamp(godRayDistanceParams.w, 0.0, 1.0));

            shaftAccum += beamWeight;
            vec3 shaftTint = mix(cloudShadowColor, vec3(1.0), clamp(transmittance * 1.2, 0.0, 1.0));
            tintAccum += shaftTint * beamWeight;
        }

        float rawShaftAccum = shaftAccum;
        float signalAccum = rawShaftAccum;
        // Keep accumulation clamping in the same reference units as the tuned
        // 16-step march so increasing step count does not lower ray strength.
        float accumScale = max(stepCount * 0.25, 1.0e-4);
        float maxAccum = max(godRayMarchParams.w, 0.0) * (accumScale / 4.0);
        if(maxAccum > 0.0)
        {
            float kneeStart = maxAccum * 0.65;
            if(signalAccum > kneeStart)
            {
                float kneeRange = max(maxAccum - kneeStart, 1.0e-4);
                float over = signalAccum - kneeStart;
                signalAccum = kneeStart + (over * kneeRange) / (over + kneeRange);
            }
            signalAccum = min(signalAccum, maxAccum);
        }

        float shaftSignal = signalAccum / accumScale;
        shaftSignal = clamp(shaftSignal, 0.0, 1.0);
        shaftSignal = max((shaftSignal - 0.08) / 0.92, 0.0);
        shaftSignal = smoothstep(0.0, 1.0, pow(shaftSignal, 0.80));

        vec3 shaftTint = rawShaftAccum > 1.0e-5 ? tintAccum / rawShaftAccum : vec3(1.0);

        vec3 rayColor = shaftTint * sunColor * (rayIntensity * sceneDistanceWeight * forwardScatter * shaftSignal);
        float rayLuma = dot(rayColor, vec3(0.2126, 0.7152, 0.0722));

        float sunSuppressSq = sunCoreSuppress * sunCoreSuppress;
        float maxRayLuma = mix(0.18, 0.02, sunSuppressSq);
        if(rayLuma > maxRayLuma) rayColor *= maxRayLuma / max(rayLuma, 1.0e-4);

        rayColor *= 1.0 / (1.0 + 6.0 * rayLuma);

        fragColor = vec4(rayColor, shaftSignal);
    }
]

shader 0 "godRayDepthGuide" [
    attribute vec4 vvertex;
    @(screentexcoord 0)
    varying vec2 depthTexCoord;

    void main(void)
    {
        gl_Position = vvertex;
        depthTexCoord = vtexcoord0;
    }
] [
    @(gfetchdefs tex0)
    uniform vec3 gdepthpackparams;
    varying vec2 depthTexCoord;
    fragdata(0) vec4 fragColor;

    void main(void)
    {
        @(gdepthunpack sceneDepth [gfetch(tex0, depthTexCoord)])
        @(gpackdepth packedDepth sceneDepth)
        fragColor = vec4(packedDepth, 1.0);
    }
]

shader 0 "godRayATrousFilter" [
    attribute vec4 vvertex;
    void main(void)
    {
        gl_Position = vvertex;
    }
] [
    uniform sampler2DRect tex0;
    uniform sampler2DRect tex1;
    uniform vec3 gdepthunpackparams;
    uniform vec2 aTrousSize;
    uniform vec4 aTrousParams;
    fragdata(0) vec4 fragColor;

    float aTrousKernel(int kernelIndex)
    {
        if(kernelIndex <= 0) return 0.375;
        if(kernelIndex == 1) return 0.25;
        return 0.0625;
    }

    float decodeGuideDepth(vec2 sampleCoord)
    {
        return dot(texture2DRect(tex1, sampleCoord).rgb, gdepthunpackparams);
    }

    float relativeDepthDiff(float sampleDepth, float centerDepth)
    {
        return abs(sampleDepth - centerDepth) / max(max(sampleDepth, centerDepth), 1.0);
    }

    void main(void)
    {
        vec2 pixelCoord = gl_FragCoord.xy;
        vec4 centerValue = texture2DRect(tex0, pixelCoord);
        float centerDepth = decodeGuideDepth(pixelCoord);
        vec3 accumColor = vec3(0.0);
        float totalWeight = 0.0;
        float dilation = max(aTrousParams.x, 1.0);
        float depthStrength = max(aTrousParams.y, 0.0);

        for(int offsetY = -2; offsetY <= 2; ++offsetY)
        {
            int absOffsetY = offsetY < 0 ? -offsetY : offsetY;
            float weightY = aTrousKernel(absOffsetY);
            for(int offsetX = -2; offsetX <= 2; ++offsetX)
            {
                int absOffsetX = offsetX < 0 ? -offsetX : offsetX;
                float weightX = aTrousKernel(absOffsetX);
                vec2 sampleCoord = clamp(
                    pixelCoord + vec2(float(offsetX), float(offsetY)) * dilation,
                    vec2(0.5), aTrousSize - vec2(0.5));
                float depthDiff = relativeDepthDiff(decodeGuideDepth(sampleCoord), centerDepth);
                float depthWeight = exp(-depthDiff * depthDiff * depthStrength);
                float sampleWeight = weightX * weightY * depthWeight;
                accumColor += texture2DRect(tex0, sampleCoord).rgb * sampleWeight;
                totalWeight += sampleWeight;
            }
        }

        fragColor = vec4(accumColor / max(totalWeight, 1.0e-5), centerValue.a);
    }
]

shader 0 "godRayUpsample" [
    attribute vec4 vvertex;
    @(screentexcoord 0)
    varying vec2 rayTexCoord;
    @(screentexcoord 1)
    varying vec2 depthTexCoord;

    void main(void)
    {
        gl_Position = vvertex;
        rayTexCoord = vtexcoord0;
        depthTexCoord = vtexcoord1;
    }
] [
    uniform sampler2DRect tex0;
    uniform sampler2DRect tex1;
    @(gfetchdefs tex2)
    uniform vec2 godRaySourceSize;
    uniform vec4 godRayUpsampleDepth;
    varying vec2 rayTexCoord;
    varying vec2 depthTexCoord;
    fragdata(0) vec4 fragColor;

    float decodeGuideDepth(vec3 packedDepth)
    {
        return dot(packedDepth, gdepthunpackparams);
    }

    float relativeDepthDiff(float sampleDepth, float centerDepth)
    {
        return abs(sampleDepth - centerDepth) / max(max(sampleDepth, centerDepth), 1.0);
    }

    void main(void)
    {
        @(gdepthunpack sceneDepth [gfetch(tex2, depthTexCoord)])
        vec2 baseCoord = floor(rayTexCoord - vec2(0.5)) + vec2(0.5);
        vec2 fracCoord = clamp(rayTexCoord - baseCoord, 0.0, 1.0);
        float bestDepthDiff = 1.0e16;
        vec3 bestColor = texture2DRect(tex0, clamp(floor(rayTexCoord) + vec2(0.5), vec2(0.5), godRaySourceSize - vec2(0.5))).rgb;

        for(int offsetY = 0; offsetY <= 1; ++offsetY)
        {
            for(int offsetX = 0; offsetX <= 1; ++offsetX)
            {
                vec2 sampleCoord = clamp(baseCoord + vec2(float(offsetX), float(offsetY)),
                                         vec2(0.5), godRaySourceSize - vec2(0.5));
                float depthDiff = relativeDepthDiff(decodeGuideDepth(texture2DRect(tex1, sampleCoord).rgb), sceneDepth);
                if(depthDiff < bestDepthDiff)
                {
                    bestDepthDiff = depthDiff;
                    bestColor = texture2DRect(tex0, sampleCoord).rgb;
                }
            }
        }

        vec3 accumColor = vec3(0.0);
        float totalWeight = 0.0;

        for(int offsetY = 0; offsetY <= 1; ++offsetY)
        {
            float weightY = offsetY == 0 ? 1.0 - fracCoord.y : fracCoord.y;
            for(int offsetX = 0; offsetX <= 1; ++offsetX)
            {
                float weightX = offsetX == 0 ? 1.0 - fracCoord.x : fracCoord.x;
                vec2 sampleCoord = clamp(baseCoord + vec2(float(offsetX), float(offsetY)),
                                         vec2(0.5), godRaySourceSize - vec2(0.5));
                float depthDiff = relativeDepthDiff(decodeGuideDepth(texture2DRect(tex1, sampleCoord).rgb), sceneDepth);
                float depthPenalty = max(depthDiff - bestDepthDiff, 0.0);
                float depthWeight = exp(-depthPenalty * depthPenalty * godRayUpsampleDepth.x);
                float sampleWeight = weightX * weightY * depthWeight;
                accumColor += texture2DRect(tex0, sampleCoord).rgb * sampleWeight;
                totalWeight += sampleWeight;
            }
        }

        if(totalWeight <= 1.0e-5)
        {
            fragColor = vec4(bestColor, 1.0);
            return;
        }

        fragColor = vec4(accumColor / totalWeight, 1.0);
    }
]
