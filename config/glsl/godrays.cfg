////////////////////////////////////////////////
//
// Crepuscular Rays
//
////////////////////////////////////////////////

shader 0 "cloudCrepuscularRays" [
    attribute vec4 vvertex;
    @(screentexcoord 0)
    varying vec2 depthTexCoord;

    void main(void)
    {
        gl_Position = vvertex;
        depthTexCoord = vtexcoord0;
    }
] [
    @(gfetchdefs tex0)
    uniform sampler2D tex1;
    uniform mat4 worldmatrix;
    uniform vec3 camera;
    uniform vec3 sunDir;
    uniform vec3 sunColor;
    uniform vec4 cloudShadowParams;
    uniform vec4 cloudShadowTransform;
    uniform vec3 cloudShadowColor;
    uniform vec4 godRayMarchParams; // x=forward exp, y=density, z=max distance, w=max accumulation clamp
    uniform vec4 godRayDistanceParams; // x=near fade start, y=near fade end, z=step count, w=strength
    uniform float cloudShadowStrength;
    varying vec2 depthTexCoord;
    fragdata(0) vec4 fragColor;

    vec2 sampleCloudLayer(vec3 relativePos)
    {
        if(cloudShadowStrength <= 0.0 || sunDir.z <= 1.0e-4) return vec2(1.0, 0.0);

        float sunProjection = (cloudShadowParams.x - relativePos.z) / sunDir.z;
        if(sunProjection < 0.0) return vec2(1.0, 0.0);

        vec2 projected = relativePos.xy + sunDir.xy * sunProjection;
        float projectedDistance = length(projected);
        if(projectedDistance >= cloudShadowParams.w) return vec2(1.0, 0.0);

        float fade = cloudShadowParams.z < cloudShadowParams.w ? 1.0 - smoothstep(cloudShadowParams.z, cloudShadowParams.w, projectedDistance) : 1.0;
        vec2 rotated = vec2(dot(projected, cloudShadowTransform.zw), projected.y*cloudShadowTransform.z - projected.x*cloudShadowTransform.w);
        vec2 cloudTexCoord = vec2(cloudShadowTransform.x - rotated.x * cloudShadowParams.y,
                                  cloudShadowTransform.y + rotated.y * cloudShadowParams.y);

        float cloudSample = texture2D(tex1, cloudTexCoord).a;
        float cloudMask = clamp(cloudSample * cloudShadowStrength * fade, 0.0, 1.0);
        return vec2(1.0 - cloudMask, cloudMask);
    }

    void main(void)
    {
        @(gdepthunpack sceneDepth [gfetch(tex0, depthTexCoord)] [
            vec3 scenePos = (worldmatrix * vec4(sceneDepth*depthTexCoord, sceneDepth, 1.0)).xyz;
        ] [
            vec4 scenePos4 = worldmatrix * vec4(depthTexCoord, sceneDepth, 1.0);
            vec3 scenePos = scenePos4.xyz / scenePos4.w;
        ])

        vec3 rayVector = scenePos - camera;
        float sceneDistance = length(rayVector);

        if(sceneDistance <= 1.0e-4 || sunDir.z <= 1.0e-4)
        {
            fragColor = vec4(0.0, 0.0, 0.0, 0.0);
            return;
        }

        vec3 viewDirection = rayVector / sceneDistance;
        float maxDistance = min(sceneDistance, godRayMarchParams.z);
        if(abs(viewDirection.z) > 1.0e-4)
        {
            float cloudLayerDistance = cloudShadowParams.x / viewDirection.z;
            if(cloudLayerDistance > 0.0) maxDistance = min(maxDistance, cloudLayerDistance);
        }
        float stepCount = clamp(godRayDistanceParams.z, 1.0, 64.0);
        float stepSize = maxDistance / stepCount;

        if(stepSize <= 1.0e-5)
        {
            fragColor = vec4(0.0, 0.0, 0.0, 0.0);
            return;
        }

        float farFadeStart = godRayMarchParams.z * 0.35;
        float sceneDistanceWeight = smoothstep(godRayDistanceParams.x, godRayDistanceParams.y, sceneDistance);
        float sunView = clamp(dot(viewDirection, sunDir), 0.0, 1.0);
        float forwardScatter = mix(0.25, 1.0, pow(sunView, max(godRayMarchParams.x, 1.0)));
        float sunCoreSuppress = smoothstep(0.985, 0.9996, sunView);
        forwardScatter *= 1.0 - 0.55 * sunCoreSuppress;
        float rayIntensity = max(godRayMarchParams.y, 0.25) * 0.24 * clamp(godRayDistanceParams.w, 0.0, 1.0);
        float dither = fract(dot(gl_FragCoord.xy, vec2(0.75487766, 0.56984030)) * 52.9829189);

        float runningMean = 0.5;
        float runningMeanBlend = 1.0 - pow(1.0 - 0.06, 16.0 / stepCount);

        float shaftAccum = 0.0;
        vec3 tintAccum = vec3(0.0);

        for(int stepIndex = 0; stepIndex < 64; ++stepIndex)
        {
            if(float(stepIndex) >= stepCount) break;

            float sampleDistance = (float(stepIndex) + dither + 0.5) * stepSize;
            sampleDistance = min(sampleDistance, maxDistance);
            vec3 relativePos = viewDirection * sampleDistance;
            float distanceWeight = smoothstep(godRayDistanceParams.x, godRayDistanceParams.y, sampleDistance);
            distanceWeight *= 1.0 - smoothstep(farFadeStart, godRayMarchParams.z, sampleDistance);
            distanceWeight = pow(distanceWeight, 1.0 / max(godRayMarchParams.y, 1.0e-3));

            vec2 cloudLayer = sampleCloudLayer(relativePos);
            float transmittance = cloudLayer.x;

            float excess = max(transmittance - runningMean, 0.0);
            runningMean = mix(runningMean, transmittance, runningMeanBlend);

            float transmissionWeight = pow(transmittance, 1.35);
            float beamWeight = pow(excess, 0.7) * transmissionWeight * distanceWeight;

            shaftAccum += beamWeight;
            vec3 shaftTint = mix(cloudShadowColor, vec3(1.0), clamp(transmittance * 1.2, 0.0, 1.0));
            tintAccum += shaftTint * beamWeight;
        }

        float rawShaftAccum = shaftAccum;
        float signalAccum = rawShaftAccum;
        // Keep accumulation clamping in the same reference units as the tuned
        // 16-step march so increasing step count does not lower ray strength.
        float accumScale = max(stepCount * 0.25, 1.0e-4);
        float maxAccum = max(godRayMarchParams.w, 0.0) * (accumScale / 4.0);
        if(maxAccum > 0.0)
        {
            float kneeStart = maxAccum * 0.65;
            if(signalAccum > kneeStart)
            {
                float kneeRange = max(maxAccum - kneeStart, 1.0e-4);
                float over = signalAccum - kneeStart;
                signalAccum = kneeStart + (over * kneeRange) / (over + kneeRange);
            }
            signalAccum = min(signalAccum, maxAccum);
        }

        float shaftSignal = signalAccum / accumScale;
        shaftSignal = clamp(shaftSignal, 0.0, 1.0);
        shaftSignal = max((shaftSignal - 0.08) / 0.92, 0.0);
        shaftSignal = smoothstep(0.0, 1.0, pow(shaftSignal, 0.80));

        vec3 shaftTint = rawShaftAccum > 1.0e-5 ? tintAccum / rawShaftAccum : vec3(1.0);

        vec3 rayColor = shaftTint * sunColor * (rayIntensity * sceneDistanceWeight * forwardScatter * shaftSignal);
        float rayLuma = dot(rayColor, vec3(0.2126, 0.7152, 0.0722));

        float sunSuppressSq = sunCoreSuppress * sunCoreSuppress;
        float maxRayLuma = mix(0.18, 0.02, sunSuppressSq);
        if(rayLuma > maxRayLuma) rayColor *= maxRayLuma / max(rayLuma, 1.0e-4);

        rayColor *= 1.0 / (1.0 + 6.0 * rayLuma);

        fragColor = vec4(rayColor, shaftSignal);
    }
]

godraygeometryshadowshader = [
    local shadowrect
    shadowrect = $arg2
    shader 0 $arg1 [
        attribute vec4 vvertex;
        @(screentexcoord 0)
        varying vec2 depthTexCoord;

        void main(void)
        {
            gl_Position = vvertex;
            depthTexCoord = vtexcoord0;
        }
    ] [
        @(gfetchdefs tex0)
        @(? $shadowrect [uniform sampler2DRectShadow tex2;] [uniform sampler2DShadow tex2;])
        uniform mat4 worldmatrix;
        uniform vec3 camera;
        uniform vec3 sunDir;
        uniform vec3 sunColor;
        uniform mat3 csmmatrix;
        uniform vec4 csmtc[8];
        uniform vec3 csmoffset[8];
        uniform vec2 csmz;
        uniform int csmcount;
        uniform int godRayGeomSteps;
        uniform vec2 shadowatlasscale;
        uniform vec4 godRayGeomParams;         // x=density, y=history decay, z=max distance, w=phase exponent
        uniform vec4 godRayGeomDistanceParams; // x=strength
        uniform vec4 godRayGeomShapeParams;    // x=shadow bias, y=signal threshold
        varying vec2 depthTexCoord;
        fragdata(0) vec4 fragColor;

        vec3 getcsmtc(vec3 pos, float distbias)
        {
            vec3 tc;
            vec3 lightPos = csmmatrix * pos;
            lightPos.z -= distbias;
            tc.z = csmz.x + lightPos.z*csmz.y;
            for(int i = 0; i < 8; ++i)
            {
                if(i >= csmcount) break;
                tc.xy = csmtc[i].xy + lightPos.xy*csmtc[i].z;
                if(max(abs(tc.x), abs(tc.y)) < csmtc[i].w) return tc + csmoffset[i];
            }
            return vec3(-1.0);
        }

        float shadowTap(vec3 shadowtc, vec2 offset)
        {
            @(? $shadowrect [
                return float(shadow2DRect(tex2, shadowtc + vec3(offset, 0.0)));
            ] [
                return float(shadow2D(tex2, vec3((shadowtc.xy + offset) * shadowatlasscale, shadowtc.z)));
            ])
        }

        float filterSunShadow(vec3 shadowtc)
        {
            vec2 offset = fract(shadowtc.xy - 0.5);
            vec3 center = vec3(shadowtc.xy - offset*0.5, shadowtc.z);
            vec4 size = vec4(offset + 1.0, 2.0 - offset);
            return (1.0/9.0) * dot(size.zxzx*size.wwyy,
                                   vec4(shadowTap(center, vec2(-0.5, -0.5)),
                                        shadowTap(center, vec2( 1.0, -0.5)),
                                        shadowTap(center, vec2(-0.5,  1.0)),
                                        shadowTap(center, vec2( 1.0,  1.0))));
        }

        float sampleSunVisibility(vec3 pos, float distbias)
        {
            vec3 shadowtc = getcsmtc(pos, distbias);
            if(shadowtc.x < 0.0) return 1.0;
            return clamp(filterSunShadow(shadowtc), 0.0, 1.0);
        }

        void main(void)
        {
            @(gdepthunpack sceneDepth [gfetch(tex0, depthTexCoord)] [
                vec3 scenePos = (worldmatrix * vec4(sceneDepth*depthTexCoord, sceneDepth, 1.0)).xyz;
            ] [
                vec4 scenePos4 = worldmatrix * vec4(depthTexCoord, sceneDepth, 1.0);
                vec3 scenePos = scenePos4.xyz / scenePos4.w;
            ])

            vec3 rayVector = scenePos - camera;
            float sceneDistance = length(rayVector);
            if(sceneDistance <= 1.0e-4 || csmcount <= 0)
            {
                fragColor = vec4(0.0, 0.0, 0.0, 0.0);
                return;
            }

            vec3 viewDirection = rayVector / sceneDistance;
            float maxDistance = min(sceneDistance, godRayGeomParams.z);
            int stepCount = clamp(godRayGeomSteps, 1, 64);
            float stepCountF = float(stepCount);
            float stepSize = maxDistance / stepCountF;
            if(stepSize <= 1.0e-5)
            {
                fragColor = vec4(0.0, 0.0, 0.0, 0.0);
                return;
            }

            float farFadeStart = godRayGeomParams.z * 0.35;
            float sceneDistanceWeight = 1.0 - smoothstep(farFadeStart, godRayGeomParams.z, sceneDistance);
            float sunView = clamp(dot(viewDirection, sunDir) * 0.5 + 0.5, 0.0, 1.0);
            float forwardScatter = mix(0.30, 1.0, pow(sunView, max(godRayGeomParams.w, 0.25)));
            float rayIntensity = max(godRayGeomParams.x, 0.25) * 0.16 * clamp(godRayGeomDistanceParams.x, 0.0, 2.0);
            float dither = fract(dot(gl_FragCoord.xy, vec2(0.75487766, 0.56984030)) * 52.9829189);

            float runningVisibility = 0.10;
            float runningBlend = clamp(1.0 - godRayGeomParams.y, 1.0/64.0, 1.0);
            float shaftAccum = 0.0;

            for(int stepIndex = 0; stepIndex < 64; ++stepIndex)
            {
                if(stepIndex >= stepCount) break;

                float sampleDistance = (float(stepIndex) + dither + 0.5) * stepSize;
                sampleDistance = min(sampleDistance, maxDistance);
                vec3 samplePos = camera + viewDirection * sampleDistance;
                float distanceWeight = 1.0 - smoothstep(farFadeStart, godRayGeomParams.z, sampleDistance);
                float visibility = sampleSunVisibility(samplePos, max(godRayGeomShapeParams.x + stepSize*0.35, 0.0));
                float excess = max(visibility - runningVisibility, 0.0);
                runningVisibility = mix(runningVisibility, visibility, runningBlend);

                float directContrib = visibility * distanceWeight * 0.25;
                float beamWeight = (pow(excess, 0.70) * pow(visibility, 0.80) + directContrib) * distanceWeight;
                shaftAccum += beamWeight;
            }

            float accumScale = max(stepCountF * 0.25, 1.0e-4);
            float shaftSignal = clamp(shaftAccum / accumScale, 0.0, 1.0);
            float threshold = clamp(godRayGeomShapeParams.y, 0.0, 0.99);
            shaftSignal = max((shaftSignal - threshold) / max(1.0 - threshold, 1.0e-3), 0.0);
            shaftSignal = smoothstep(0.0, 1.0, pow(shaftSignal, 0.85));

            vec3 rayColor = sunColor * (rayIntensity * sceneDistanceWeight * forwardScatter * shaftSignal);
            float rayLuma = dot(rayColor, vec3(0.2126, 0.7152, 0.0722));
            rayColor *= 1.0 / (1.0 + 4.0 * rayLuma);

            fragColor = vec4(rayColor, shaftSignal);
        }
    ]
]

godraygeometryshadowshader "geometryCrepuscularRaysRect" 1
godraygeometryshadowshader "geometryCrepuscularRays2D" 0

shader 0 "godRayDepthGuide" [
    attribute vec4 vvertex;
    @(screentexcoord 0)
    varying vec2 depthTexCoord;

    void main(void)
    {
        gl_Position = vvertex;
        depthTexCoord = vtexcoord0;
    }
] [
    @(gfetchdefs tex0)
    uniform vec3 gdepthpackparams;
    varying vec2 depthTexCoord;
    fragdata(0) vec4 fragColor;

    void main(void)
    {
        @(gdepthunpack sceneDepth [gfetch(tex0, depthTexCoord)])
        @(gpackdepth packedDepth sceneDepth)
        fragColor = vec4(packedDepth, 1.0);
    }
]

shader 0 "godRayUpsample" [
    attribute vec4 vvertex;
    void main(void)
    {
        gl_Position = vvertex;
    }
] [
    uniform sampler2DRect tex0;      // low-res god ray buffer
    @(gfetchdefs tex1 $msaalight)
    uniform vec4 godrayScale;      // xy = output/src, zw = src/output
    uniform float bilateralDepthScale;
    uniform vec4 viewsize;
    fragdata(0) vec4 fragcolor;

    float fetchDepthLinear(vec2 uv)
    {
        @(gdepthunpack depth [gfetch(tex1, uv)])
        return depth;
    }

    void main(void)
    {
        vec2 uv = gl_FragCoord.xy;
        float centerDepth = fetchDepthLinear(uv);

        vec2 srcSize = max(floor(viewsize.xy * godrayScale.zw + vec2(0.5)), vec2(1.0));
        vec2 srcF = uv * godrayScale.zw;
        vec2 base = floor(srcF);
        vec2 fracP = fract(srcF);

        vec3 accum = vec3(0.0);
        float totalWeight = 0.0;
        vec3 best = vec3(0.0);
        float bestDepthErr = 1.0e16;

        for(int iy = 0; iy < 2; ++iy)
        {
            for(int ix = 0; ix < 2; ++ix)
            {
                vec2 o = vec2(float(ix), float(iy));
                float wx = ix == 0 ? (1.0 - fracP.x) : fracP.x;
                float wy = iy == 0 ? (1.0 - fracP.y) : fracP.y;
                float spatialWeight = wx * wy;
                if(spatialWeight <= 1.0e-6) continue;

                vec2 pix = clamp(base + o, vec2(0.0), srcSize - vec2(1.0));
                vec2 sampleUV = pix + vec2(0.5);
                vec2 depthProbeUV = clamp(pix * godrayScale.xy + vec2(0.5), vec2(0.5), viewsize.xy - vec2(0.5));

                float sampleDepth = fetchDepthLinear(depthProbeUV);
                float depthErr = abs(sampleDepth - centerDepth) * bilateralDepthScale;
                vec3 sampleColor = texture2DRect(tex0, sampleUV).rgb;

                if(depthErr < bestDepthErr)
                {
                    bestDepthErr = depthErr;
                    best = sampleColor;
                }

                if(depthErr > 3.0) continue;
                float depthWeight = exp(-depthErr * depthErr);
                float w = spatialWeight * depthWeight;
                accum += sampleColor * w;
                totalWeight += w;
            }
        }

        vec3 color = totalWeight > 1.0e-5 ? (accum / totalWeight) : best;
        fragcolor = vec4(color, 0.0);
    }
]
